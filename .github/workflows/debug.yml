name: Debug build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
    paths:
      - "app/src/**/*.kt"
      - "build.gradle.kts"
      - "gradle/libs.versions.toml"
      
jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
       fetch-depth: 0
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 3.41.6
        cache: true
        
    - name: Cache Flutter pub
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ hashFiles('flutter/pubspec.lock') }}
        restore-keys: pub-

    - name: Cache Flutter AAR
      id: cache-aar
      uses: actions/cache@v4
      with:
        path: flutter/build/host/outputs/repo
        key: flutter-aar-${{ hashFiles('flutter/pubspec.lock', 'flutter/lib/**/*.dart') }}
        
    - name: Build Flutter AAR
      working-directory: flutter
      run: |
        flutter pub get
        flutter build aar --debug

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: setup golang
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.2'

    - name: Build ncore
      run: |
          git clone https://github.com/FMAC-Team/nekosu.git
          mkdir -p app/src/main/jniLibs/arm64-v8a/
          export SDIR=$PWD
          cd nekosu/userspace/libncore
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$ANDROID_HOME/ndk/29.0.14206865/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android34-clang go build -buildmode=c-shared -o libncore.so .
          cp libncore.so $SDIR/app/src/main/jniLibs/arm64-v8a/

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v5
      with:
         name: release
         path: app/build/outputs/apk/debug/*.apk
